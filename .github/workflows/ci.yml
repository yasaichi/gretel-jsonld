name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.gemfile }} w/ Ruby v${{ matrix.ruby }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: 2.3.8
            gemfile: rails_3x
            bundler: 1
          - ruby: 2.3.8
            gemfile: rails_4x
            bundler: 1
          - ruby: 2.3.8
            gemfile: rails_5x
            bundler: default
          - ruby: 2.4.6
            gemfile: rails_4x
            bundler: 1
          - ruby: 2.4.6
            gemfile: rails_5x
            bundler: default
          - ruby: 2.5.5
            gemfile: rails_5x
            bundler: default
          - ruby: 2.6.3
            gemfile: rails_5x
            bundler: default
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1.320.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: ${{ matrix.bundler }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake

      - name: Save coverage report
        if: github.event_name == 'push' && matrix.ruby == '2.6.3'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: coverage
          path: coverage/.resultset.json
          retention-days: 1

  coverage:
    name: Report coverage
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Restore coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: coverage

      - uses: qltysh/qlty-action/coverage@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0
        with:
          files: coverage/.resultset.json
          oidc: true
