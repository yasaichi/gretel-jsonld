name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1.320.0
        with:
          ruby-version: ruby
          bundler-cache: true

      - parallel:
          - name: Run Reek
            run: bundle exec reek

          - name: Run RuboCop
            run: bundle exec rubocop

  test:
    name: Test (Gretel ${{ matrix.gretel }} / Rails ${{ matrix.rails }} / Ruby ${{ matrix.ruby }})
    needs: lint
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - gretel: "3"
            rails: "5"
            ruby: "2.5"
          - gretel: "4"
            rails: "5"
            ruby: "2.5"
          - gretel: "4"
            rails: "7"
            ruby: "3.4"
          - gretel: "5"
            rails: "6"
            ruby: "3.3"
          - gretel: "5"
            rails: "8"
            ruby: "4.0"
    env:
      BUNDLE_GEMFILE: ${{ format('{0}/gemfiles/gretel_{1}_rails_{2}.gemfile', github.workspace, matrix.gretel, matrix.rails) }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1.320.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake

      - name: Save coverage report
        if: matrix.ruby == '4.0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: coverage
          path: coverage/.resultset.json
          retention-days: 1

  coverage:
    name: Report coverage
    needs: test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Restore coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: coverage

      - uses: qltysh/qlty-action/coverage@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0
        with:
          files: coverage/.resultset.json
          oidc: true
